<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cadastrar Professor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            margin-top: 50px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            max-width: 550px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 class="mb-4">Cadastrar Professor</h2>

        <form th:action="@{/professores/salvar}" th:object="${professor}" method="post">

            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" th:field="*{nome}" required>
                <span th:errors="*{nome}" class="text-danger small"></span>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" required>
                <span th:errors="*{email}" class="text-danger small"></span>
            </div>

            <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control" th:field="*{senha}" required>
                <span th:errors="*{senha}" class="text-danger small"></span>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="dataNascimento" class="form-label">Data de Nascimento</label>
                    <input type="date" class="form-control" th:field="*{dataNascimento}" required>
                    <span th:errors="*{dataNascimento}" class="text-danger small"></span>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="salarioBase" class="form-label">Salário Base</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{salarioBase}" required>
                    <span th:errors="*{salarioBase}" class="text-danger small"></span>
                </div>
            </div>

            <div class="mb-3">
                <label for="cursoId" class="form-label">Curso</label>
                <select name="cursoId" id="cursoId" class="form-select" required>
                    <option value="" disabled selected>Selecione um curso</option>
                    <option th:each="curso : ${cursos}" th:value="${curso.curso_id}" th:text="${curso.nome}"></option>
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1">Salvar</button>
                <a th:href="@{/professores}" class="btn btn-secondary">Cancelar</a>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
