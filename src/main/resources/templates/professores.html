<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Lista de Professores</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            margin-top: 50px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 class="mb-4">Lista de Professores</h2>

        <!-- Formulário de Busca -->
        <form class="row g-3 mb-4" method="get">
            <div class="col-md-9">
                <input type="text" class="form-control" name="nome" placeholder="Buscar por nome">
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100">Buscar</button>
            </div>
        </form>

        <!-- Tabela -->
        <div class="table-responsive">
            <table class="table table-bordered table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Curso</th>
                    </tr>
                </thead>
                <tbody>
                    
                    <tr th:each="professor : ${professores}">
                        <td th:text="${professor.id}" ></td>
                        <td th:text="${professor.nome}"></td>
                        <td th:text="${professor.email}"></td>
                        <td th:text="${professor.curso != null ? professor.curso.nome : 'Sem curso'}"></td>
                    </tr>

                    <tr th:if="${professores.empty}">
                        <td colspan="4" class="text-center">Nenhum professor encontrado</td>
                    </tr>

                </tbody>
            </table>
        </div>

        <!-- Paginação -->
        <nav aria-label="Navegação de páginas">
            <ul class="pagination justify-content-center mt-4">

                <li class="page-item">
                    <a class="page-link" href="#">Anterior</a>
                </li>

                <li class="page-item disabled">
                    <span class="page-link">Página 1</span>
                </li>

                <li class="page-item">
                    <a class="page-link" href="#">Próxima</a>
                </li>

            </ul>
        </nav>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
